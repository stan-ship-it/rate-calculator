<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculateur d'Honoraires · Moonshot Growth</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
  /* ══════════════════════════════════════
     THEMES
  ══════════════════════════════════════ */
  :root, .theme-warm {
    --bg:            #f6f3ee;
    --surface:       #ffffff;
    --border:        #ece7de;
    --border-mid:    #ddd8ce;
    --text:          #1b1e2d;
    --text-mid:      #8a8f9e;
    --text-dim:      #c0bab0;
    --accent:        #f5a623;
    --accent-rgb:    245,166,35;
    --accent-2:      #ff8800;
    --grid-c:        rgba(140,125,100,.13);
    --thead-bg:      #faf8f4;
    --row-border:    #f4f0ea;
    --bar-track-bg:  #ede8e0;
    --shadow-sm:     0 1px 3px rgba(0,0,0,.05), 0 2px 10px rgba(0,0,0,.04);
    --shadow-md:     0 4px 20px rgba(0,0,0,.09), 0 1px 4px rgba(0,0,0,.05);
    --r:             12px;
  }

  .theme-blue {
    --bg:            #edf2f9;
    --surface:       #ffffff;
    --border:        #ccd8ed;
    --border-mid:    #bed0ea;
    --text:          #18213a;
    --text-mid:      #5a7398;
    --text-dim:      #99b0cc;
    --accent:        #3b6ef5;
    --accent-rgb:    59,110,245;
    --accent-2:      #1a4fd6;
    --grid-c:        rgba(70,100,160,.1);
    --thead-bg:      #f3f7fd;
    --row-border:    #edf2fb;
    --bar-track-bg:  #d8e4f5;
    --shadow-sm:     0 1px 3px rgba(0,0,30,.06), 0 2px 10px rgba(0,0,30,.04);
    --shadow-md:     0 4px 20px rgba(0,0,30,.10), 0 1px 4px rgba(0,0,30,.05);
  }

  /* ══════════════════════════════════════
     GLOBAL THEME-TRANSITION DECLARATIONS
     (smooth crossfade on class swap)
  ══════════════════════════════════════ */
  body,
  .hdr, .card, .t-head, .tr, .bar-track, .bar-fill, .bmark,
  .hdr-sub, .budget-eur, .range-labels, .bar-scale,
  .rate-title, .rate-big, .footer, .field-label,
  .res-lbl, .t-lbl, .t-rate, .t-base, .t-fee,
  .budget-input, .min-notice, .min-badge, .brand {
    transition-property: background-color, background, border-color,
                         color, box-shadow, text-shadow, opacity;
    transition-duration: 0.35s;
    transition-timing-function: ease;
  }

  /* ══════════════════════════════════════
     BASE
  ══════════════════════════════════════ */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 56px 20px 72px;
    overflow-x: hidden;
  }

  /* Grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-c) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-c) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    width: 100%;
    max-width: 640px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0;
  }

  /* ══════════════════════════════════════
     HEADER
  ══════════════════════════════════════ */
  .hdr {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .hdr > div { display: flex; flex-direction: column; gap: 2px; }

  .hdr h1 {
    font-family: 'Space Mono', monospace;
    font-size: 34px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -.01em;
    line-height: 1.18;
  }

  .hdr-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 300;
    color: var(--text-mid);
    margin-top: 6px;
    letter-spacing: .01em;
  }

  /* ── Swatches ── */
  .swatches {
    display: flex;
    gap: 7px;
    align-items: center;
    margin-top: 10px;
  }

  .swatch {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
    outline: none;
    flex-shrink: 0;
    /* override the global transition for swatches — snappier */
    transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease !important;
  }

  .swatch[data-theme="theme-warm"] { background: #f5a623; }
  .swatch[data-theme="theme-blue"]  { background: #3b6ef5; }

  .swatch.active {
    border-color: rgba(0,0,0,.3);
    transform: scale(1.18);
    box-shadow: 0 2px 8px rgba(0,0,0,.22);
  }

  .swatch:hover:not(.active) {
    transform: scale(1.22);
    box-shadow: 0 2px 10px rgba(0,0,0,.2);
  }

  .brand {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .04em;
    color: var(--accent);
    text-shadow: 0 0 24px rgba(var(--accent-rgb),.35);
    cursor: default;
  }

  .brand:hover { text-shadow: 0 0 36px rgba(var(--accent-rgb),.55); }

  /* ══════════════════════════════════════
     CARDS
  ══════════════════════════════════════ */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    box-shadow: var(--shadow-sm);
  }

  /* ── Budget card ── */
  .budget-card { padding: 24px 24px 20px; }

  .budget-card:focus-within {
    border-color: rgba(var(--accent-rgb),.35);
    box-shadow: var(--shadow-sm), 0 0 0 3px rgba(var(--accent-rgb),.09);
  }

  .field-label {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-mid);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .field-label::before {
    content: '';
    display: block;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: dot-pulse 2.5s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes dot-pulse {
    0%,100% { box-shadow: 0 0 6px  rgba(var(--accent-rgb),.35); }
    50%      { box-shadow: 0 0 16px rgba(var(--accent-rgb),.7);  }
  }

  .budget-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 22px;
  }

  .budget-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 64px;
    font-weight: 400;
    color: var(--text);
    background: transparent;
    border: none;
    outline: none;
    -moz-appearance: textfield;
    width: 280px;
    letter-spacing: -.03em;
    caret-color: var(--accent);
  }

  .budget-input::-webkit-outer-spin-button,
  .budget-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .budget-eur {
    font-family: 'JetBrains Mono', monospace;
    font-size: 37px;
    font-weight: 300;
    color: var(--text-dim);
  }

  /* ── Slider ── */
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 0 3px var(--surface), 0 0 0 5px rgba(var(--accent-rgb),.3);
    animation: thumb-pulse 2.5s ease-in-out infinite;
    transition: background .35s ease, transform .15s ease;
  }

  input[type="range"]:active::-webkit-slider-thumb {
    transform: scale(1.15);
    animation: none;
    box-shadow: 0 0 0 3px var(--surface), 0 0 0 10px rgba(var(--accent-rgb),.25);
  }

  @keyframes thumb-pulse {
    0%,100% { box-shadow: 0 0 0 3px var(--surface), 0 0 0 5px  rgba(var(--accent-rgb),.28); }
    50%      { box-shadow: 0 0 0 3px var(--surface), 0 0 0 10px rgba(var(--accent-rgb),.13); }
  }

  .bmark-row {
    position: relative;
    height: 7px;
    margin-top: 5px;
  }

  .bmark {
    position: absolute;
    top: 0;
    width: 1px;
    height: 7px;
    background: var(--border-mid);
    transform: translateX(-50%);
  }

  .range-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
  }

  .min-notice {
    display: none;
    align-items: center;
    gap: 7px;
    margin-top: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text-mid);
  }

  .min-notice.show { display: flex; }

  .min-badge {
    background: rgba(var(--accent-rgb),.12);
    color: var(--accent);
    border: 1px solid rgba(var(--accent-rgb),.3);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .07em;
  }

  /* ══════════════════════════════════════
     RESULT CARDS
  ══════════════════════════════════════ */
  .results {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .res-card {
    border-radius: var(--r);
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 16px;
    box-shadow: var(--shadow-sm);
    cursor: default;
    will-change: transform;
    /* combine hover + theme transitions */
    transition:
      transform .2s ease,
      box-shadow .25s ease,
      background-color .35s ease,
      background .35s ease,
      border-color .35s ease !important;
  }

  .res-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
  }

  .res-card.accent {
    border-color: rgba(var(--accent-rgb),.38);
    background: linear-gradient(140deg, #fff 0%, rgba(var(--accent-rgb),.055) 100%);
    box-shadow: 0 0 0 1px rgba(var(--accent-rgb),.35), 0 4px 24px rgba(var(--accent-rgb),.18);
  }

  .res-card.accent:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 0 1px rgba(var(--accent-rgb),.45), 0 8px 36px rgba(var(--accent-rgb),.22);
  }

  .res-lbl {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-mid);
    margin-bottom: 9px;
  }

  .res-card.accent .res-lbl { color: var(--accent); opacity: .75; }

  .res-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 25px;
    color: var(--text);
  }

  .res-card.accent .res-val {
    font-size: 32px;
    color: var(--accent);
  }

  /* ══════════════════════════════════════
     BRACKET TABLE
  ══════════════════════════════════════ */
  .table-card { overflow: hidden; }

  .t-head {
    display: grid;
    grid-template-columns: 1fr 64px 88px 88px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--thead-bg);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .tr {
    display: grid;
    grid-template-columns: 1fr 64px 88px 88px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--row-border);
    font-size: 15px;
    align-items: center;
    position: relative;
    will-change: transform, opacity;
  }

  .tr:last-child { border-bottom: none; }

  .tr::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 0 2px 2px 0;
    background: transparent;
    box-shadow: none;
    transition: background .3s ease, box-shadow .3s ease;
  }

  .tr.active { background: rgba(var(--accent-rgb),.045); }

  .tr.active::after {
    background: var(--accent);
    box-shadow: 2px 0 12px rgba(var(--accent-rgb),.45);
  }

  .tr.inactive { opacity: .22; }

  .t-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text);
    padding-left: 10px;
  }

  .t-rate, .t-base, .t-fee {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text-mid);
  }

  .t-rate { text-align: center; }
  .t-base, .t-fee { text-align: right; }

  .tr.active .t-rate { color: var(--accent); }
  .tr.active .t-fee  { color: var(--text); font-weight: 500; }

  /* ══════════════════════════════════════
     RATE BAR
  ══════════════════════════════════════ */
  .rate-card { padding: 16px 20px; }

  .rate-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }

  .rate-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-mid);
  }

  .rate-big {
    font-family: 'JetBrains Mono', monospace;
    font-size: 27px;
    color: var(--accent);
    text-shadow: 0 0 16px rgba(var(--accent-rgb),.3);
  }

  .bar-track {
    height: 8px;
    background: var(--bar-track-bg);
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 12px rgba(var(--accent-rgb),.4);
  }

  .bar-fill::after {
    content: '';
    position: absolute;
    top: 0; left: -200%;
    width: 80%;
    height: 100%;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.55) 50%, transparent 100%);
    animation: shimmer 2.8s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%   { left: -200%; }
    100% { left: 250%;  }
  }

  .bar-scale {
    display: flex;
    justify-content: space-between;
    margin-top: 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: var(--text-dim);
  }

  /* ══════════════════════════════════════
     FOOTER
  ══════════════════════════════════════ */
  .footer {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: .08em;
    padding-top: 4px;
  }
  @media (max-width: 540px) {
    .results {
      grid-template-columns: 1fr 1fr;
    }
    .res-card.accent {
      grid-column: 1 / -1;
    }
    .t-head,
    .tr {
      grid-template-columns: 1fr 64px 88px;
      padding-left: 12px;
      padding-right: 12px;
    }
    .t-base { display: none; }
    .t-head span:nth-child(3) { display: none; }
  }
</style>
</head>
<body class="theme-blue">
<div class="wrap" id="wrap">

  <div class="hdr">
    <div>
      <h1 id="mainTitle">Calculateur d'honoraires</h1>
      <div class="brand">Moonshot Growth</div>
      <div class="swatches" id="swatches">
        <button class="swatch"        data-theme="theme-warm" title="Thème chaud" aria-label="Thème chaud"></button>
        <button class="swatch active" data-theme="theme-blue" title="Thème bleu"  aria-label="Thème bleu"></button>
      </div>
    </div>
  </div>

  <div class="card budget-card" id="budgetCard">
    <div class="field-label">Budget média mensuel</div>
    <div class="budget-row">
      <input type="number" id="budgetInput" class="budget-input" value="0" min="0" max="9999999" step="500">
      <span class="budget-eur">€</span>
    </div>
    <div class="slider-wrap">
      <input type="range" id="budgetSlider" min="0" max="150000" step="500" value="0">
      <div class="bmark-row">
        <div class="bmark" style="left:3.33%"></div>
        <div class="bmark" style="left:13.33%"></div>
        <div class="bmark" style="left:33.33%"></div>
        <div class="bmark" style="left:66.67%"></div>
      </div>
    </div>
    <div class="range-labels">
      <span>0 €</span><span>50 k€</span><span>100 k€</span><span>150 k€</span>
    </div>
    <div class="min-notice" id="minNotice">
      <span class="min-badge">MIN</span>
      Forfait minimum de 800 € appliqué
    </div>
  </div>

  <div class="results" id="resultsRow">
    <div class="res-card accent" id="feeCard">
      <div class="res-lbl">Honoraires HT</div>
      <div class="res-val" id="totalFee">—</div>
    </div>
    <div class="res-card">
      <div class="res-lbl">Taux effectif</div>
      <div class="res-val" id="effectiveRate">—</div>
    </div>
    <div class="res-card">
      <div class="res-lbl">Total client</div>
      <div class="res-val" id="totalClient">—</div>
    </div>
  </div>

  <div class="card table-card" id="tableCard">
    <div class="t-head">
      <span>Tranche</span>
      <span style="text-align:center">Taux</span>
      <span style="text-align:right">Base</span>
      <span style="text-align:right">Honoraires</span>

    </div>
    <div id="bracketsContainer"></div>
  </div>

  <div class="card rate-card" id="rateCard">
    <div class="rate-top">
      <span class="rate-title">Taux effectif</span>
      <span class="rate-big" id="barPct">—</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="barFill"></div>
    </div>
    <div class="bar-scale">
      <span>8 %</span><span>10 %</span><span>12 %</span><span>15 %</span><span>18 %</span>
    </div>
  </div>


</div>

<script>
  /* ── CONSTANTS ── */
  const BRACKETS = [
    { min: 0,      max: 5000,    rate: 0.18, label: "0 → 5 000 €" },
    { min: 5000,   max: 20000,   rate: 0.15, label: "5 001 → 20 000 €" },
    { min: 20000,  max: 50000,   rate: 0.12, label: "20 001 → 50 000 €" },
    { min: 50000,  max: 100000,  rate: 0.10, label: "50 001 → 100 000 €" },
    { min: 100000, max: Infinity, rate: 0.08, label: "> 100 000 €" },
  ];
  const MIN_FEE   = 800;
  const MAX_SLIDE = 150000;
  const INIT_VAL  = 10000;

  const fmt    = n => new Intl.NumberFormat('fr-FR', { style:'currency', currency:'EUR', maximumFractionDigits:0 }).format(n);
  const fmtPct = n => (n * 100).toFixed(1) + '\u202f%';

  /* ── COMPUTE ── */
  function compute(budget) {
    let fee = 0;
    const rows = [];
    for (const b of BRACKETS) {
      if (budget <= b.min) { rows.push({ ...b, base:0, fee:0, active:false }); continue; }
      const cap  = b.max === Infinity ? budget : b.max;
      const base = Math.min(budget, cap) - b.min;
      const bf   = base * b.rate;
      fee += bf;
      rows.push({ ...b, base, fee:bf, active:true });
    }
    const minApplied = budget > 0 && fee < MIN_FEE;
    fee = Math.max(fee, budget > 0 ? MIN_FEE : 0);
    return { fee, rows, minApplied };
  }

  /* ── DOM REFS ── */
  const slider      = document.getElementById('budgetSlider');
  const input       = document.getElementById('budgetInput');
  const elFee       = document.getElementById('totalFee');
  const elRate      = document.getElementById('effectiveRate');
  const elClient    = document.getElementById('totalClient');
  const elBarFill   = document.getElementById('barFill');
  const elBarPct    = document.getElementById('barPct');
  const elBrackets  = document.getElementById('bracketsContainer');
  const elMinNotice = document.getElementById('minNotice');
  const elFeeCard   = document.getElementById('feeCard');

  /* ── STATE ── */
  const C = { fee: 0, effRate: 0, client: 0 };
  let prevActive    = new Set();
  let isFirstRender = true;

  /* ── HELPERS ── */
  function accentRGB() {
    return getComputedStyle(document.documentElement)
      .getPropertyValue('--accent-rgb').trim();
  }

  function updateSliderFill(val) {
    const pct = Math.min(val / MAX_SLIDE * 100, 100);
    slider.style.background =
      `linear-gradient(to right, var(--accent) ${pct}%, var(--border-mid) ${pct}%)`;
  }

  /* ── RENDER ── */
  function render(budget, animate = true) {
    const { fee, rows, minApplied } = compute(budget);
    const effRate = budget > 0 ? fee / budget : 0;

    elMinNotice.classList.toggle('show', minApplied);

    /* bracket rows */
    const newActive = new Set();
    elBrackets.innerHTML = '';
    rows.forEach((row, i) => {
      if (row.active) newActive.add(i);
      const el = document.createElement('div');
      el.className = 'tr ' + (row.active ? 'active' : 'inactive');
      el.innerHTML = `
        <span class="t-lbl">${row.label}</span>
        <span class="t-rate">${fmtPct(row.rate)}</span>
        <span class="t-base">${row.base > 0 ? fmt(row.base) : '—'}</span>
        <span class="t-fee">${row.fee  > 0 ? fmt(row.fee)  : '—'}</span>
      `;
      elBrackets.appendChild(el);

      if (row.active && !prevActive.has(i) && animate && !isFirstRender) {
        const rgb = accentRGB();
        gsap.fromTo(el,
          { x: -8, opacity: 0, backgroundColor: `rgba(${rgb},.18)` },
          { x:  0, opacity: 1, backgroundColor: `rgba(${rgb},.045)`,
            duration: 0.38, ease: 'power3.out',
            onComplete: () => { el.style.backgroundColor = ''; }
          }
        );
      }
    });
    prevActive    = newActive;
    isFirstRender = false;

    /* non-animated path */
    if (!animate) {
      C.fee = fee; C.effRate = effRate; C.client = budget + fee;
      if (budget > 0) {
        elFee.textContent    = fmt(fee);
        elRate.textContent   = fmtPct(effRate);
        elClient.textContent = fmt(budget + fee);
        elBarPct.textContent = fmtPct(effRate);
      } else {
        elFee.textContent = elRate.textContent =
          elClient.textContent = elBarPct.textContent = '—';
      }
      elBarFill.style.width =
        (budget > 0 ? Math.max(0, Math.min((effRate - .08) / .10 * 100, 100)) : 0) + '%';
      return;
    }

    /* budget = 0, animated */
    if (budget === 0) {
      gsap.to(C, {
        fee: 0, effRate: 0, client: 0,
        duration: 0.4, ease: 'power2.out', overwrite: 'auto',
        onUpdate() {
          elFee.textContent    = C.fee    > 1 ? fmt(Math.round(C.fee))    : '—';
          elRate.textContent   = C.effRate > 0 ? fmtPct(C.effRate)         : '—';
          elClient.textContent = C.client  > 1 ? fmt(Math.round(C.client)) : '—';
          elBarPct.textContent = C.effRate > 0 ? fmtPct(C.effRate)         : '—';
        }
      });
      gsap.to(elBarFill, { width: '0%', duration: 0.5, ease: 'power2.out', overwrite: 'auto' });
      return;
    }

    /* fee card flash */
    const rgb = accentRGB();
    gsap.fromTo(elFeeCard,
      { boxShadow: `0 0 0 1px rgba(${rgb},.7), 0 0 40px rgba(${rgb},.35)` },
      { boxShadow: `0 0 0 1px rgba(${rgb},.35), 0 4px 24px rgba(${rgb},.18)`,
        duration: 0.7, ease: 'power2.out', overwrite: 'auto',
        onComplete: () => { elFeeCard.style.boxShadow = ''; }
      }
    );

    /* rolling counters */
    gsap.to(C, {
      fee, effRate, client: budget + fee,
      duration: 0.5, ease: 'power2.out', overwrite: 'auto',
      onUpdate() {
        elFee.textContent    = fmt(Math.round(C.fee));
        elRate.textContent   = fmtPct(C.effRate);
        elClient.textContent = fmt(Math.round(C.client));
        elBarPct.textContent = fmtPct(C.effRate);
      }
    });

    /* bar fill */
    const barW = Math.max(0, Math.min((effRate - .08) / .10 * 100, 100));
    gsap.to(elBarFill, { width: barW + '%', duration: 0.55, ease: 'power2.out', overwrite: 'auto' });
  }

  /* ── THEME SWITCH ── */
  function switchTheme(theme) {
    document.body.classList.remove('theme-warm', 'theme-blue');
    document.body.classList.add(theme);

    document.querySelectorAll('.swatch').forEach(s =>
      s.classList.toggle('active', s.dataset.theme === theme)
    );

    /* re-apply slider fill so var(--accent) resolves to new color */
    updateSliderFill(parseInt(input.value) || 0);
    /* release any GSAP-held box-shadow so CSS variables take over */
    elFeeCard.style.boxShadow = '';

    /* brief scale-pulse on the wrap */
    gsap.fromTo('#wrap',
      { opacity: 0.87, scale: 0.997 },
      { opacity: 1,    scale: 1, duration: 0.4, ease: 'power2.out' }
    );
  }

  /* ── PAGE LOAD ── */
  window.addEventListener('DOMContentLoaded', () => {
    gsap.set('#wrap', { opacity: 1 });

    /* split title into word-spans for clip reveal */
    const h1    = document.getElementById('mainTitle');
    const words = h1.textContent.trim().split(/\s+/);
    h1.innerHTML = words.map(w =>
      `<span style="display:inline-block;overflow:hidden;vertical-align:bottom">` +
      `<span style="display:inline-block">${w}</span></span>`
    ).join(' ');
    const wordSpans = h1.querySelectorAll('span > span');

    /*
     * PRE-HIDE all animated elements synchronously before any paint.
     * We use gsap.set() + gsap.to() instead of gsap.from(), because
     * gsap.from() inside a timeline applies the "from" state immediately
     * at registration time (not at the tween's position), causing elements
     * to flash visible then disappear.
     */
    gsap.set('.brand',   { opacity: 0, y: 6 });
    gsap.set(wordSpans,  { y: '100%' });
    gsap.set('.swatches',{ opacity: 0, y: 5 });
    gsap.set(['#budgetCard','#resultsRow','#tableCard','#rateCard'],
             { opacity: 0, y: 20 });

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    tl.to('.brand',    { y: 0, opacity: 1, duration: 0.4  }, 0.05);
    tl.to(wordSpans,   { y: 0, opacity: 1, duration: 0.55, stagger: 0.08 }, 0.1);
    tl.to('.swatches', { y: 0, opacity: 1, duration: 0.3  }, 0.46);
    tl.from('.hdr',    { borderBottomColor: 'transparent', duration: 0.45 }, 0.36);
    tl.to(['#budgetCard','#resultsRow','#tableCard','#rateCard'], {
      y: 0, opacity: 1, duration: 0.5, stagger: 0.09
    }, 0.52);

    /* animate to initial value once cards are visible */
    tl.call(() => {
      input.value  = INIT_VAL;
      slider.value = INIT_VAL;
      updateSliderFill(INIT_VAL);
      render(INIT_VAL, true);
    }, null, 1.05);

    updateSliderFill(0);
    render(0, false);

    /* swatch listeners */
    document.querySelectorAll('.swatch').forEach(s =>
      s.addEventListener('click', () => switchTheme(s.dataset.theme))
    );
  });

  /* ── INPUT EVENTS ── */
  slider.addEventListener('input', () => {
    const val = parseInt(slider.value);
    input.value = val;
    updateSliderFill(val);
    render(val);
  });

  input.addEventListener('input', () => {
    const val = Math.max(0, parseInt(input.value) || 0);
    slider.value = Math.min(val, MAX_SLIDE);
    updateSliderFill(Math.min(val, MAX_SLIDE));
    render(val);
  });

  input.addEventListener('blur', () => {
    if (input.value === '' || isNaN(parseInt(input.value))) {
      input.value = 0; slider.value = 0;
      updateSliderFill(0); render(0);
    }
  });
</script>
</body>
</html>
